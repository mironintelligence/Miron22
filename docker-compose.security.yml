version: "3.9"

# Zero-Persistence güvenlik yapılandırması
# Kullanım: docker compose -f docker-compose.yml -f docker-compose.security.yml up

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped

    # Konteyner filesystem'i read-only; yalnızca tmpfs yazılabilir
    read_only: true

    # /tmp → RAM-only tmpfs mount (disk'e asla yazılmaz)
    tmpfs:
      - /tmp:size=150M,mode=1777
      - /var/tmp:size=50M,mode=1777

    environment:
      - TMPDIR=/tmp
      - PYTHONTMPDIR=/tmp
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - SESSION_TIMEOUT_MINUTES=30
      - MAX_FILE_SIZE_MB=50
      - SECURE_DELETION=true
      - OPENAI_ZERO_RETENTION=true
      - AUDIT_LOG_ENABLED=true
      # Supabase değişkenleri production'da kaldırılmalı; doğrudan DB_URL kullan
      # SUPABASE_URL ve SUPABASE_KEY bu dosyada tanımlanmıyor

    security_opt:
      - no-new-privileges:true    # setuid/setgid binary'ler çalışamaz
      - seccomp:unconfined        # gerekliyse kısıtla; default Docker profili önerilir

    cap_drop:
      - ALL                       # tüm Linux capabilities'i kaldır
    cap_add:
      - NET_BIND_SERVICE          # 8000 portunu dinlemek için yeterli

    # Non-root user (Dockerfile'da tanımlanmalı)
    user: "1000:1000"

    # Ağ: sadece internal ve db erişimi
    networks:
      - internal

    ports:
      - "8000:8000"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # Konteyner kaynak sınırları
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=50M,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - internal
    ports:
      - "5173:80"

networks:
  internal:
    driver: bridge
    internal: false  # dış erişim için false; tam izolasyon için true
